<style>
/* Gill Sans is a system font — no import needed */
:root{--bg:#0f0f12;--surface:#18181e;--surface2:#1e1e26;--border:#2a2a36;--accent:#f4bdc3;--accent-dim:rgba(244,189,195,0.09);--text:#f0f0ee;--muted:#8888a0;--muted2:#55556a;--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{width:41px;height:28px;background:transparent;border-radius:0;display:grid;place-items:center;flex-shrink:0;}
header h1{font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.06em;}
header p{font-size:.6rem;color:var(--muted);margin-top:2px;}

.app{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}
aside{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow-y:auto;height:100%;}
.sidebar-inner{padding:18px 16px;display:flex;flex-direction:column;gap:18px;flex:1;}
.s-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}

.ctrl{display:flex;flex-direction:column;gap:6px;}
.ctrl label{font-size:.6rem;color:var(--muted);}
.ctrl select,.ctrl input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;font-size:.68rem;padding:6px 8px;outline:none;transition:border-color .15s;width:100%;}
.ctrl select:focus,.ctrl input:focus{border-color:var(--accent);}
.ctrl input::placeholder{color:var(--muted2);}
.ctrl input:disabled{opacity:.4;cursor:not-allowed;}
.paper-hint{font-size:.56rem;color:var(--muted2);margin-top:5px;}
.paper-hint b{color:var(--accent);}

.card-form{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:14px;margin-bottom:10px;}
.card-form.collapsed{gap:0;}
.card-form.collapsed .card-form-body{display:none;}
.collapse-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:0 0 0 6px;font-size:.75rem;line-height:1;transition:transform .15s;display:flex;align-items:center;}
.collapse-btn:hover{color:var(--text);}
.card-form.collapsed .collapse-btn{transform:rotate(-90deg);}
.card-form-header{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted);cursor:pointer;user-select:none;}
.card-form-header b{color:var(--accent);}
.remove-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 6px;border-radius:4px;transition:all .15s;}
.remove-btn:hover{color:#ff6b6b;background:rgba(255,107,107,.1);}

.num-row{display:flex;align-items:center;gap:6px;}
.num-row input{flex:1;min-width:0;}
.num-divider{color:var(--muted);font-size:.8rem;flex-shrink:0;}
.num-total{flex:1;min-width:0;background:var(--surface2)!important;border-color:var(--muted2)!important;color:var(--muted)!important;cursor:default;}

.set-row{display:flex;align-items:center;gap:6px;}
.set-row select{flex:1;}
.set-sym-thumb{width:24px;height:24px;object-fit:contain;border:1px solid var(--border);border-radius:3px;background:var(--bg);flex-shrink:0;}
.edition-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.edition-pill{padding:4px 10px;border-radius:20px;font-size:.6rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;transition:all .15s;}
.edition-pill:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.edition-pill.selected{background:var(--accent);color:#111;border-color:var(--accent);}
.edition-pill:disabled{opacity:.5;cursor:default;}
.edition-auto-note{font-size:.55rem;color:var(--muted2);font-style:italic;}

.add-card-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1.5px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;font-size:.68rem;cursor:pointer;transition:all .15s;width:100%;}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:7px;font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;font-size:.7rem;font-weight:500;cursor:pointer;border:none;width:100%;transition:all .15s;}
.btn-primary{background:var(--accent);color:#111;}
.btn-primary:hover{background:#b5dc35;}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--text);color:var(--text);}
.btn-sm{padding:6px 12px;width:auto;font-size:.62rem;}
.btn-danger{background:transparent;border:1px solid rgba(255,100,100,.3);color:#ff7070;}
.btn-danger:hover{background:rgba(255,100,100,.1);}
.count-badge{display:inline-flex;align-items:center;background:var(--accent-dim);border:1px solid rgba(244,189,195,.3);border-radius:20px;padding:2px 8px;font-size:.58rem;color:var(--accent);margin-left:8px;}

#preview{padding:24px 28px;overflow-x:hidden;overflow-y:auto;background:var(--bg);height:100%;}
.page-scale-wrap{overflow:hidden;position:relative;margin:0 auto 32px;}
.page-scale-wrap .page-wrap{transform-origin:top left;margin:0!important;}
.preview-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.preview-top h2{font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.05em;}
.preview-actions{display:flex;gap:8px;}
.page-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.page-label::after{content:'';flex:1;height:1px;background:var(--border);}

.page-wrap{background:white;margin:0;box-shadow:0 4px 40px rgba(0,0,0,.5);border-radius:2px;display:flex;align-items:center;justify-content:center;}
.card-grid{display:grid;}

/* ── CARD SLOT: 2.5" x 3.5" = 240 x 336px ───────────────────────────
   Layout mirrors the preview image:
   - No border between cards, only small corner cut marks
   - Name: large bold, top area
   - Number: bold, below name
   - Symbol: large, centered, generous space
   - Set name: bold, not italic
   - Edition: small, normal weight
   - Code: small, italic, in parens
-------------------------------------------------------------------- */
.card-slot{
  width:240px; height:336px;
  background:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  overflow:visible; flex-shrink:0;
  position:relative;
  /* No border — cut marks only */
}

/* Corner cut marks — four real elements, one per corner.
   html2canvas does not support box-shadow on pseudo-elements
   or CSS outline, so we use inset border + per-corner spans. */

/* Default: no border, dots only (shown via .corner-dot spans) */
.card-slot { border: 1px solid transparent; }

/* Border type variants */
.border-solid .card-slot  { border: 1px solid #999; }
.border-dotted .card-slot { border: 1px dashed #999; }
.border-none .card-slot   { border: 1px solid transparent; }

/* Dots mode: hide the border, show corner dots */
.border-dots .card-slot   { border: 1px solid transparent; }

/* Suppress the old ::before pseudo-element entirely */
.card-slot::before { display: none !important; }

/* Corner dot spans injected by JS */
.corner-dot {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #000;
  z-index: 2;
  /* hidden by default; shown only in dots mode */
  display: none;
}
.border-dots .corner-dot { display: block; }
.corner-dot.tl { top: 0; left: 0; transform: translate(-50%, -50%); }
.corner-dot.tr { top: 0; right: 0; transform: translate(50%, -50%); }
.corner-dot.bl { bottom: 0; left: 0; transform: translate(-50%, 50%); }
.corner-dot.br { bottom: 0; right: 0; transform: translate(50%, 50%); }

.card-slot.empty{
  background:white;
  display:flex; align-items:center; justify-content:center;
}
.card-slot.empty::after{
  content:"BLANK";
  font-size:1.6rem;
  font-weight:700;
  color:#ddd;
  letter-spacing:.15em;
}
.card-slot.empty .empty-slot-label{ display:none; }
.empty-slot-label{
  color:#d0d0d0; font-size:.54rem; font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
}

/* Card content wrapper — vertically centered group */
.cs-inner{
  display:flex; flex-direction:column; align-items:center;
  width:100%; padding:0 20px;
  gap:0; overflow:hidden;
}

/* Name: large, bold, serif-adjacent feel */
.cs-name{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.85rem; font-weight:700;
  color:#111; line-height:1.2;
  margin-bottom:5px;
  width:100%;
}

/* Number: bold, prominent */
.cs-number{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.45rem; font-weight:700;
  color:#111;
  margin-bottom:12px;
}
.cs-number.blank{ color:#ccc; font-weight:400; font-size:1.25rem; margin-bottom:12px; }

/* Symbol: large, centered */
.cs-symbol-wrap{
  width:84px; height:84px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
}
.cs-symbol{ width:80px; height:80px; object-fit:contain; }
.cs-symbol-placeholder{
  width:60px; height:60px;
  border:2px dashed #ddd; border-radius:6px;
  display:grid; place-items:center;
  color:#ccc; font-size:.5rem;
}

/* Set name: bold, not italic */
.cs-set{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.2rem; font-weight:700;
  color:#111; line-height:1.3;
  margin-bottom:4px;
}

/* Edition: smaller, normal weight */
.cs-edition{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}

/* Code: small, italic */
.cs-holo{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}
.cs-variant{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}
.cs-code{
  font-size:1.05rem; font-style:italic;
  color:#555;
}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;text-align:center;}
.empty-icon{width:60px;height:60px;border:1.5px dashed var(--border);border-radius:12px;display:grid;place-items:center;}
.empty-state h3{font-size:.85rem;color:var(--muted);font-weight:400;}
.empty-state p{font-size:.65rem;color:var(--muted);opacity:.7;}

@media print {
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;margin:0;}
  header,aside,.preview-top,.page-label{display:none!important;}
  .app{display:block!important;}
  #preview{padding:0!important;background:white!important;overflow:visible!important;}
  .page-wrap{box-shadow:none!important;border-radius:0!important;page-break-after:always;break-after:page;margin:0!important;}
  .page-wrap:last-child{page-break-after:avoid;break-after:avoid;}
  .card-slot{break-inside:avoid;page-break-inside:avoid;}
  .empty-state{display:none!important;}
}

/* Searchable card picker */
.card-picker{position:relative;}
.card-picker-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:5px;color:var(--text);font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:.68rem;padding:6px 8px;outline:none;transition:border-color .15s;
  cursor:pointer;
}
.card-picker-input:read-only{cursor:pointer;caret-color:transparent;}
.card-picker-input:focus{border-color:var(--accent);}
.card-picker-input::placeholder{color:var(--muted2);}
.card-picker-dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:999;
  background:var(--surface2);border:1px solid var(--accent);
  border-top:none;border-radius:0 0 5px 5px;
  max-height:200px;overflow-y:auto;
  display:none;
}
.card-picker-dropdown.open{display:block;}
.card-picker-dropdown::-webkit-scrollbar{width:4px;}
.card-picker-dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.card-picker-option{
  padding:6px 8px;font-size:.66rem;cursor:pointer;color:var(--text);
  transition:background .1s;
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
}
.card-picker-option:hover,.card-picker-option.highlighted{background:var(--accent-dim);color:var(--accent);}
.card-picker-option.no-results{color:var(--muted);cursor:default;}
</style>

function buildPokemonOptions(filter) {
  var f = filter.toLowerCase();
  var opts = '';
  // All option
  if (!f || 'all'.indexOf(f) !== -1) {
    var isSelAll = pokemonFilter === '';
    opts += '<div class="card-picker-option' + (isSelAll ? ' highlighted' : '') + '"'
          + ' data-pokemon="All"'
          + ' onmousedown="pokemonOptionMousedown(event)">All</div>';
  }
  for (var pi = 0; pi < POKEMON_LIST.length; pi++) {
    var p = POKEMON_LIST[pi];
    var dexNum = '#' + String(pi + 1).padStart(4, '0');
    var label = dexNum + ' - ' + p;
    if (!f || label.toLowerCase().indexOf(f) !== -1 || p.toLowerCase().indexOf(f) !== -1) {
      var isSel = p === pokemonFilter;
      opts += '<div class="card-picker-option' + (isSel ? ' highlighted' : '') + '"'
            + ' data-pokemon="' + esc(p) + '"'
            + ' onmousedown="pokemonOptionMousedown(event)">'
            + esc(label) + '</div>';
    }
  }
  return opts || '<div class="card-picker-option no-results">No Pokémon found</div>';
}

function openPokemonPickerMousedown(e) {

function openPokemonPicker() {
  var drop  = document.getElementById('poke-picker-drop-global');

function closePokemonPicker() {

  if (input) { input.value = pokemonFilter || 'All'; input.setAttribute('readonly', ''); }
}

function pokemonOptionMousedown(e) {

function pickPokemon(e, uid, name) {
  e.preventDefault();
  pokemonFilter = (name === 'All') ? '' : name;
  cards.forEach(function(c) {
    if (pokemonFilter && c.set) {
      var scd = SET_CARD_DATA[c.set];
      if (scd) {
        var hasMatch = scd.some(function(card) {
          return card.name.toLowerCase().indexOf(pokemonFilter.toLowerCase()) !== -1;
        });
        if (!hasMatch) {
          c.set = ''; c.cardKey = -1; c.name = ''; c.cardNum = '';
          c.editions = []; c.holos = []; c.serials = [];
          c.variantLabels = []; c.customNotes = [];
        }
      }
    }
  });
  closePokemonPicker();
  renderForms();
  renderPreview();
}

function pokemonPickerKeydown(e) {
  var drop = document.getElementById('poke-picker-drop-global');
  if (!drop || !drop.classList.contains('open')) return;
  var opts = drop.querySelectorAll('.card-picker-option:not(.no-results)');
  var highlighted = drop.querySelector('.card-picker-option.highlighted');
  var idx = -1;
  opts.forEach(function(o, i) { if (o === highlighted) idx = i; });
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    var next = idx < opts.length - 1 ? idx + 1 : 0;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[next]) { opts[next].classList.add('highlighted'); opts[next].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    var prev = idx > 0 ? idx - 1 : opts.length - 1;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[prev]) { opts[prev].classList.add('highlighted'); opts[prev].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (highlighted) pickPokemon(e, 'global', highlighted.dataset.pokemon);
  } else if (e.key === 'Escape') {
    closePokemonPicker();
  }
}

function toggleCameo(checked) {

function matchesPokemonFilter(card) {
  if (!pokemonFilter) return true;
  var f = pokemonFilter.toLowerCase();
  // If card has primary field, use exact match against primary/cameo only
  if (card.primary !== undefined) {
    if (card.primary) {
      var primaries = card.primary.split(',');
      for (var i = 0; i < primaries.length; i++) {
        if (primaries[i].trim().toLowerCase() === f) return true;
      }
    }
    if (includeCameo && card.cameo) {
      var cameos = card.cameo.split(',');
      for (var j = 0; j < cameos.length; j++) {
        if (cameos[j].trim().toLowerCase() === f) return true;
      }
    }
    return false;
  }
  // Fallback: match against card name (old data without primary field)
  if (card.name.toLowerCase().indexOf(f) !== -1) return true;
  return false;
}

function setsForPokemon() {
  if (!pokemonFilter) return KNOWN_SETS;
  return KNOWN_SETS.filter(function(s) {
    var scd = SET_CARD_DATA[s];
    return scd && scd.some(function(c) { return matchesPokemonFilter(c); });
  });
}

function cardsForPokemon(setName) {
  var scd = SET_CARD_DATA[setName];
  if (!scd) return [];
  if (!pokemonFilter) return scd;
  return scd.filter(function(c) { return matchesPokemonFilter(c); });
}

function toggleCardCollapse(cardId, e) {

function handleFieldEvent(e) {
  var el    = e.target;
  var id    = parseInt(el.dataset.id);
  var field = el.dataset.field;
  if (!id || !field) return;
  var c = cards.find(function(c) { return c.id === id; });
  if (!c) return;
  // customNote inputs are handled by updateCustomNote directly
  if (field && field.indexOf('customNote') === 0) return;
  c[field] = el.value;
  if (field === 'set') {
    var info = SET_DATA[el.value];
    var eds2 = (info && info.editions) ? info.editions : [];
    c.editions = eds2.length === 1 ? [eds2[0]] : [];
    c.cardNum      = '';
    c.holos        = [];
    c.cardKey      = -1;
    c.name         = '';
    c.variantLabels = [];
    c.customNotes  = [];
    renderForms();
  } else if (field === 'variantLabels') {
    renderForms();
  }
  renderPreview();
}

// ── CARDS ────────────────────────────────────────────
function addCard(data) {
  data = data || {};
  var initEditions = data.editions || [];
  if (!initEditions.length && data.set && SET_DATA[data.set]) {
    var eds = SET_DATA[data.set].editions;
    if (eds.length === 1) initEditions = [eds[0]];
  }
  cards.push({
    id:      ++cardIdCtr,
    name:    data.name    || '',
    cardNum: data.cardNum || '',
    set:     data.set     || '',
    editions: initEditions,
    holos:        data.holos        || [],
    code:         data.code         || '',
    cardKey:      typeof data.cardKey !== 'undefined' ? data.cardKey : -1,
    variantLabels: data.variantLabels || [],
    serials:      data.serials      || [],
    customNotes:  data.customNotes   || []
  });
  renderForms();
  renderPreview();
}

function removeCard(id) {
  cards = cards.filter(function(c) { return c.id !== id; });

}

function toggleVariant(btn, variant) {
  var id = parseInt(btn.closest('.card-form').dataset.cardid);
  var c = cards.find(function(c) { return c.id === id; });
  if (!c) return;
  if (!c.variantLabels) c.variantLabels = [];
  var idx = c.variantLabels.indexOf(variant);
  if (idx === -1) {
    c.variantLabels.push(variant);
  } else {
    c.variantLabels.splice(idx, 1);
  }
  btn.classList.toggle('selected', c.variantLabels.indexOf(variant) !== -1);
  renderPreview();
}

function buildPickerOptions(selectedKey, filter, cardSet) {
  var allCards = SET_CARD_DATA[cardSet] || BASE_SET_CARDS;
  var setCards = cardsForPokemon(cardSet) || allCards;

  var f = filter.toLowerCase();
  var opts = setCards.reduce(function(acc, bc) {
    var i = allCards.indexOf(bc);
    var label = bc.num + ' \u2014 ' + bc.name;
    if (!f || label.toLowerCase().indexOf(f) !== -1 || bc.name.toLowerCase().indexOf(f) !== -1) {
      acc += '<div class="card-picker-option' + (selectedKey === i ? ' highlighted' : '') + '"'
           + ' data-idx="' + i + '"'
           + ' onmousedown="pickCard(event, __CARDID__, ' + i + ')">'
           + esc(label) + '</div>';
    }
    return acc;
  }, '');
  return opts || '<div class="card-picker-option no-results">No cards found</div>';
}

// Track which picker is open so we can close it from a single global handler
var activePickerId = null;

document.addEventListener('mousedown', function(e) {
  if (activePickerId === null) return;
  var drop  = document.getElementById('picker-drop-'  + activePickerId);
  var input = document.getElementById('picker-input-' + activePickerId);
  // If click is inside the picker or on the input, let it through
  if ((drop && drop.contains(e.target)) || e.target === input) return;
  closeCardPicker(activePickerId);
});

function openCardPickerMousedown(e, cardId) {
  e.preventDefault();
  // If this picker is already open, close it (toggle)
  if (activePickerId === cardId) {
    closeCardPicker(cardId);
    return;
  }
  // Close any other open picker first
  if (activePickerId !== null) closeCardPicker(activePickerId);
  openCardPicker(cardId);
}

function openCardPicker(cardId) {
  var drop  = document.getElementById('picker-drop-'  + cardId);
  var input = document.getElementById('picker-input-' + cardId);
  if (!drop || !input) return;
  var c = cards.find(function(c) { return c.id === cardId; });
  activePickerId = cardId;
  input.removeAttribute('readonly');
  input.value = '';
  input.focus();
  drop.innerHTML = buildPickerOptions(c ? c.cardKey : -1, '', c ? c.set : '').replace(/__CARDID__/g, cardId);
  drop.classList.add('open');
  // Scroll to selected option
  setTimeout(function() {
    var sel = drop.querySelector('.highlighted');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }, 0);
}

function closeCardPicker(cardId) {
  if (activePickerId === cardId) activePickerId = null;
  var drop = document.getElementById('picker-drop-' + cardId);
  if (drop) drop.classList.remove('open');
  // Restore input value to selected card name and make readonly again
  var c = cards.find(function(c) { return c.id === cardId; });
  var input = document.getElementById('picker-input-' + cardId);
  if (input && c) {
    var sc2 = SET_CARD_DATA[c.set];
    input.value = c.cardKey >= 0 && sc2 && sc2[c.cardKey]
      ? sc2[c.cardKey].num + ' — ' + sc2[c.cardKey].name
      : '';
    input.setAttribute('readonly', '');
  }
}

function filterCardPicker(cardId, value) {
  var drop = document.getElementById('picker-drop-' + cardId);
  var c = cards.find(function(c) { return c.id === cardId; });
  if (!drop) return;
  drop.innerHTML = buildPickerOptions(c ? c.cardKey : -1, value, c ? c.set : '').replace(/__CARDID__/g, cardId);
  drop.classList.add('open');
}

function pickCard(e, cardId, idx) {
  e.preventDefault();
  var c = cards.find(function(c) { return c.id === cardId; });
  if (!c) return;
  var sc3 = SET_CARD_DATA[c.set] || [];
  var bc = sc3[idx];
  if (!bc) return;
  c.cardKey  = idx;
  c.name     = bc.name;
  c.cardNum  = bc.num ? bc.num.split('/')[0] : '';
  c.num      = bc.num || '';
  var pickPr = Array.isArray(bc.printings) ? bc.printings : [];
  c.holos = pickPr.length === 1 ? [pickPr[0]] : [];
  c.serials  = bc.serials && bc.serials.length === 1 ? [bc.serials[0]] : [];
  c.variantLabels = [];
  closeCardPicker(cardId);
  renderForms();
  renderPreview();
}

function cardPickerKeydown(e, cardId) {
  var drop = document.getElementById('picker-drop-' + cardId);
  if (!drop || !drop.classList.contains('open')) return;
  var opts = drop.querySelectorAll('.card-picker-option:not(.no-results)');
  var highlighted = drop.querySelector('.card-picker-option.highlighted');
  var idx = -1;
  opts.forEach(function(o, i) { if (o === highlighted) idx = i; });
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    var next = idx < opts.length - 1 ? idx + 1 : 0;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[next]) { opts[next].classList.add('highlighted'); opts[next].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    var prev = idx > 0 ? idx - 1 : opts.length - 1;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[prev]) { opts[prev].classList.add('highlighted'); opts[prev].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (highlighted) {
      var dataIdx = parseInt(highlighted.dataset.idx);
      pickCard(e, cardId, dataIdx);
    }
  } else if (e.key === 'Escape') {
    closeCardPicker(cardId);
  }
}

function selectBaseSetCard(sel, idx) {
  var formEl = sel.closest('.card-form');
  var id = parseInt(formEl.dataset.cardid);
  var c = cards.find(function(c) { return c.id === id; });
  if (!c) return;
  var setCards2 = SET_CARD_DATA[c.set] || [];
  if (idx < 0 || idx >= setCards2.length) {
    c.cardKey = -1; c.name = ''; c.cardNum = ''; c.holos = []; c.variantLabels = [];
  } else {
    var bc = setCards2[idx];
    c.cardKey      = idx;
    c.name         = bc.name;
    c.cardNum      = bc.num ? bc.num.split('/')[0] : '';
    c.num          = bc.num || '';
    var sbsPr = bc.printings ? (bc.printings[sbsEdKey] || bc.printings[''] || []) : [];
    if (!sbsPr.length) { var sfk = bc.printings ? Object.keys(bc.printings)[0] : undefined; if(sfk!==undefined) sbsPr=bc.printings[sfk]||[]; }
    c.holos = sbsPr.length === 1 ? [sbsPr[0]] : [];
    c.editions     = bc.editions && bc.editions.length === 1 ? [bc.editions[0]] : [];
    c.serials      = bc.serials && bc.serials.length === 1 ? [bc.serials[0]] : [];
    c.variantLabels = [];
  }
  renderForms();
  renderPreview();
}

function updateCustomNote(el, cardId, idx) {
  var c = cards.find(function(c) { return c.id === cardId; });
  if (!c) return;
  if (!c.customNotes) c.customNotes = [];
  var MAX_CN = 5;
  // Count visible boxes before update
  var beforeCount = Math.min(MAX_CN, c.customNotes.filter(function(n){ return n && n.trim(); }).length + 1);
  c.customNotes[idx] = el.value;
  // Remove trailing empty entries
  while (c.customNotes.length > 0 && !c.customNotes[c.customNotes.length - 1].trim()) {
    c.customNotes.pop();
  }
  // Count visible boxes after update
  var afterCount = Math.min(MAX_CN, c.customNotes.filter(function(n){ return n && n.trim(); }).length + 1);
  // Only re-render forms if the number of boxes changed (adds/removes a box)
  if (beforeCount !== afterCount) {
    renderForms();
    // Restore focus to the same input after re-render
    var newEl = document.querySelector('[data-field="customNote' + idx + '"][data-id="' + cardId + '"]');
    if (newEl) {
      newEl.focus();
      var len = newEl.value.length;
      newEl.setSelectionRange(len, len);
    }
  }
  renderPreview();
}

}

  input.value = '';
  input.focus();
  drop.innerHTML = buildSetOptions(c ? c.set : '', '').replace(/__SETID__/g, cardId);
  drop.classList.add('open');
  setTimeout(function() {
    var sel = drop.querySelector('.highlighted');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }, 0);
}

function closeSetPicker(cardId) {
  if (activeSetPickerId === cardId) activeSetPickerId = null;
  var drop  = document.getElementById('set-picker-drop-'  + cardId);
  var input = document.getElementById('set-picker-input-' + cardId);
  if (drop) drop.classList.remove('open');
  var c = cards.find(function(c) { return c.id === cardId; });
  if (input && c) { input.value = c.set || ''; input.setAttribute('readonly', ''); }
}

function filterSetPicker(cardId, value) {
  var drop = document.getElementById('set-picker-drop-' + cardId);
  var c = cards.find(function(c) { return c.id === cardId; });
  if (!drop) return;
  drop.innerHTML = buildSetOptions(c ? c.set : '', value).replace(/__SETID__/g, cardId);
  drop.classList.add('open');
}

function setOptionMousedown(e, cardId) {
  e.preventDefault();
  pickSet(e, cardId, e.currentTarget.dataset.set);
}

function pickSet(e, cardId, setName) {
  e.preventDefault();
  var c = cards.find(function(c) { return c.id === cardId; });
  if (!c) return;
  var info = SET_DATA[setName];
  var eds2 = (info && info.editions) ? info.editions : [];
  c.set           = setName;
  c.editions      = eds2.length === 1 ? [eds2[0]] : [];
  c.cardNum       = '';
  c.holos         = [];
  c.cardKey       = -1;
  c.name          = '';
  c.variantLabels = [];
  c.customNotes   = [];
  closeSetPicker(cardId);
  activeSetPickerId = null;
  renderForms();
  renderPreview();
  var dropAfter = document.getElementById('set-picker-drop-' + cardId);
  if (dropAfter) dropAfter.classList.remove('open');
}

function setPickerKeydown(e, cardId) {
  var drop = document.getElementById('set-picker-drop-' + cardId);
  if (!drop || !drop.classList.contains('open')) return;
  var opts = drop.querySelectorAll('.card-picker-option:not(.no-results)');
  var highlighted = drop.querySelector('.card-picker-option.highlighted');
  var idx = -1;
  opts.forEach(function(o, i) { if (o === highlighted) idx = i; });
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    var next = idx < opts.length - 1 ? idx + 1 : 0;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[next]) { opts[next].classList.add('highlighted'); opts[next].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    var prev = idx > 0 ? idx - 1 : opts.length - 1;
    if (highlighted) highlighted.classList.remove('highlighted');
    if (opts[prev]) { opts[prev].classList.add('highlighted'); opts[prev].scrollIntoView({block:'nearest'}); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (highlighted) pickSet(e, cardId, highlighted.dataset.set);
  } else if (e.key === 'Escape') {
    closeSetPicker(cardId);
  }
}

// ── PREVIEW ──────────────────────────────────────────

var _lastScale = 1;
var _lastScaledW = 0;
var _lastScaledH = 0;

function scalePages() {
  var preview = document.getElementById('preview');
  if (!preview) return;
  var wraps = preview.querySelectorAll('.page-scale-wrap');
  if (!wraps.length) return;
  var rect = preview.getBoundingClientRect();
  var availW = rect.width - 56;
  var availH = rect.height - 80; // subtract top bar + some padding
  if (availW <= 0) return;
  wraps.forEach(function(wrap) {
    var pageW = parseInt(wrap.getAttribute('data-page-w'), 10);
    var pageH = parseInt(wrap.getAttribute('data-page-h'), 10);
    if (!pageW || !pageH) return;
    var scaleW = availW / pageW;
    var scaleH = availH > 0 ? availH / pageH : 1;
    var scale = Math.min(1, scaleW, scaleH);
    var pageWrap = wrap.querySelector('.page-wrap');
    if (!pageWrap) return;
    pageWrap.style.transform = 'scale(' + scale + ')';
    pageWrap.style.transformOrigin = 'top left';
    var scaledW = Math.round(pageW * scale);
    var scaledH = Math.round(pageH * scale);
    wrap.style.width  = scaledW + 'px';
    wrap.style.height = scaledH + 'px';
    _lastScale   = scale;
    _lastScaledW = scaledW;
    _lastScaledH = scaledH;
  });
}

function applyLastScale() {
  // Apply cached scale immediately after re-render, before layout settles
  if (!_lastScaledH) return;
  var wraps = document.querySelectorAll('.page-scale-wrap');
  wraps.forEach(function(wrap) {
    var pageWrap = wrap.querySelector('.page-wrap');
    if (!pageWrap) return;
    pageWrap.style.transform = 'scale(' + _lastScale + ')';
    pageWrap.style.transformOrigin = 'top left';
    wrap.style.width  = _lastScaledW + 'px';
    wrap.style.height = _lastScaledH + 'px';
  });
}
window.addEventListener('resize', scalePages);

function renderPreview() {
  var container  = document.getElementById('pages-container');

  var p        = PAPER_DATA[currentPaper];
  var perPage  = p.cols * p.rows;
  var pageWpx  = Math.round(p.pageW  * DPI);
  var pageHpx  = Math.round(p.pageH  * DPI);
  var marginPx = Math.round(p.margin * DPI);
  var usableW  = p.pageW  - 2 * p.margin;
  var usableH  = p.pageH  - 2 * p.margin;
  var gapWpx   = 0;
  var gapHpx   = 0;

  // Expand cards by edition × printing combinations
  var slots = [];
  for (var ci = 0; ci < cards.length; ci++) {
    var cd = cards[ci];
    var info2 = cd.set ? SET_DATA[cd.set] : null;
    // Determine printing options for this card
    var printOpts = [];
    var hasPrintingData = false;
    var sclP=SET_CARD_DATA[cd.set];
    if (sclP && cd.cardKey >= 0 && sclP[cd.cardKey]) {
      var cdPr = sclP[cd.cardKey].printings;
      if (Array.isArray(cdPr) && cdPr.length >= 1) { printOpts = cdPr; hasPrintingData = true; }
    }
    if (!hasPrintingData && info2 && info2.hasHolo) {
      printOpts = ['Regular', 'Reverse Holo'];
      hasPrintingData = true;
    }
    var selVariants = cd.variantLabels && cd.variantLabels.length ? cd.variantLabels : [];
    var hasPrChoice  = printOpts.length > 1 && cd.holos && cd.holos.length > 0;
    var hasPrOnly1   = !hasPrintingData;  // no variant data at all — always render
    var hasPr1Sel    = printOpts.length === 1 && cd.holos && cd.holos.length > 0;
    var prOk         = hasPrOnly1 || hasPr1Sel || hasPrChoice;
    var hasCustomNotes = cd.customNotes && cd.customNotes.some(function(n) { return n && n.trim(); });
    if (prOk) {
      var selHolos    = printOpts.length > 1 && cd.holos && cd.holos.length ? cd.holos : [null];
      var sclSer      = SET_CARD_DATA[cd.set];
      var cardSerOpts  = sclSer && cd.cardKey >= 0 && sclSer[cd.cardKey] ? (sclSer[cd.cardKey].serials || []) : [];
      var hasSerChoice = cardSerOpts.length > 1 && cd.serials && cd.serials.length > 0;
      var hasSerOnly1  = cardSerOpts.length === 1 && cd.serials && cd.serials.length > 0;
      var hasSerNone   = cardSerOpts.length === 0;
      var serOk        = hasSerNone || hasSerOnly1 || hasSerChoice;
      var selSerials   = !hasSerNone && cd.serials && cd.serials.length ? cd.serials : [null];
      if (serOk) {
        selHolos.forEach(function(holo) {
          if (hasSerNone) {
            slots.push({ card: cd, edition: null, holo: holo, serial: null, variantLabel: null, customNote: null });
          } else {
            selSerials.forEach(function(serial) {
              slots.push({ card: cd, edition: null, holo: holo, serial: serial, variantLabel: null, customNote: null });
            });
          }
        });
      }
    }
    // One extra slot per selected variant label
    selVariants.forEach(function(v) {
      slots.push({ card: cd, edition: null, holo: null, serial: null, variantLabel: v, customNote: null });
    });
    // One slot per filled custom note — generated even if no variant selected
    if (hasCustomNotes) {
      cd.customNotes.forEach(function(note) {
        if (note && note.trim()) {
          slots.push({ card: cd, edition: null, holo: null, serial: null, variantLabel: null, customNote: note.trim() });
        }
      });
    }
  }
  // Update card count badge to reflect total preview slots
  var countBadge = document.getElementById('card-count');
  if (countBadge) countBadge.textContent = slots.length;

  // If no slots, show empty page grid and return
  if (slots.length === 0) {
    var p0        = PAPER_DATA[currentPaper];
    var pageWpx0  = Math.round(p0.pageW  * DPI);
    var pageHpx0  = Math.round(p0.pageH  * DPI);
    var marginPx0 = Math.round(p0.margin * DPI);
    var gapWpx0   = 0;
    var gapHpx0   = 0;
    var emptySlots = '';
    for (var ei = 0; ei < p0.cols * p0.rows; ei++) emptySlots += '<div class="card-slot empty"><span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span></div>';
    container.innerHTML =
      '<div class="page-scale-wrap" data-page-w="' + pageWpx0 + '" data-page-h="' + pageHpx0 + '">'
      + '<div class="page-wrap" style="width:' + pageWpx0 + 'px;height:' + pageHpx0 + 'px;padding:' + marginPx0 + 'px;">'
      + '<div class="card-grid border-' + currentBorderType + '" style="'
      + 'grid-template-columns:repeat(' + p0.cols + ',' + CARD_W_PX + 'px);'
      + 'grid-template-rows:repeat(' + p0.rows + ',' + CARD_H_PX + 'px);'
      + 'gap:' + gapHpx0 + 'px ' + gapWpx0 + 'px;">'
      + emptySlots + '</div></div></div>';
    document.getElementById('pg-label').textContent = '0 cards · 0 pages';
    applyLastScale();
    requestAnimationFrame(scalePages);
    return;
  }

  // Chunk slots into pages
  var chunks = [];
  for (var i = 0; i < slots.length; i += perPage) {
    var chunk = slots.slice(i, i + perPage);
    while (chunk.length < perPage) chunk.push(null);
    chunks.push(chunk);
  }

  function renderSlot(card, editionOverride, holoOverride, variantOverride, customNoteOverride, serialOverride) {
    if (!card || !card.name || !card.name.trim()) {
      return '<div class="card-slot empty"><span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span><div class="empty-slot-label">empty</div></div>';
    }
    var info       = card.set ? SET_DATA[card.set] : null;
    var sym        = card.set ? getSymbolUrl(card.set) : null;
    var total      = info ? info.total : null;
    var numDisplay = card.num ? card.num : (card.cardNum || null);

    return '<div class="card-slot">'
      + '<span class="corner-dot tl"></span>'
      + '<span class="corner-dot tr"></span>'
      + '<span class="corner-dot bl"></span>'
      + '<span class="corner-dot br"></span>'
      + '<div class="cs-inner">'
      +   '<div class="cs-name">' + esc(card.name) + '</div>'
      +   (numDisplay
            ? '<div class="cs-number">' + esc(numDisplay) + '</div>'
            : '<div class="cs-number blank">\u2014</div>')
      +   '<div class="cs-symbol-wrap">'
      +     '<img class="cs-symbol" src="' + (sym || BLANK_SYMBOL_URI) + '" alt=""/>'
      +   '</div>'
      +   (card.set
            ? '<div class="cs-set">' + esc(card.set) + '</div>'
            : '<div class="cs-set" style="color:#ccc;">\u2014</div>')

      +   (function(){
            if(!holoOverride) return '';
            var sclS=SET_CARD_DATA[card.set];
            var scdPr=sclS&&card.cardKey>=0&&sclS[card.cardKey]?sclS[card.cardKey].printings:null;
            var prArr=Array.isArray(scdPr)?scdPr:[];
            if(!prArr.length&&info&&info.hasHolo)prArr=['Regular','Reverse Holo'];
            var multi=prArr.length>1;
            return multi&&holoOverride!=='Normal'?'<div class="cs-holo">'+esc(holoOverride)+'</div>':'';
          }())
      +   (serialOverride     ? '<div class="cs-variant">' + esc(serialOverride)     + '</div>' : '')
      +   (variantOverride    ? '<div class="cs-variant">' + esc(variantOverride)    + '</div>' : '')
      +   (customNoteOverride ? '<div class="cs-variant">' + esc(customNoteOverride) + '</div>' : '')
      +   (card.code && info && info.hasCode ? '<div class="cs-code">' + esc(card.code) + '</div>' : '')
      + '</div>'
      + '</div>';
  }

  container.innerHTML = chunks.map(function(chunk, pi) {
    return '<div class="page-label">Page ' + (pi + 1) + ' of ' + chunks.length + '</div>'
      + '<div class="page-scale-wrap" data-page-w="' + pageWpx + '" data-page-h="' + pageHpx + '">'
      + '<div class="page-wrap" style="'
      +   'width:'  + pageWpx  + 'px;'
      +   'height:' + pageHpx  + 'px;'
      +   'padding:' + marginPx + 'px;'
      + '">'
      +   '<div class="card-grid border-' + currentBorderType + '" style="'
      +     'grid-template-columns:repeat(' + p.cols + ',' + CARD_W_PX + 'px);'
      +     'grid-template-rows:repeat('    + p.rows + ',' + CARD_H_PX + 'px);'
      +     'gap:' + gapHpx + 'px ' + gapWpx + 'px;'
      +   '">'
      +   chunk.map(function(slot) {
            if (!slot) return renderSlot(null, null, null, null, null, null);
            return renderSlot(slot.card, slot.edition, slot.holo, slot.variantLabel, slot.customNote, slot.serial);
          }).join('')
      +   '</div>'
      + '</div></div>';
  }).join('');


  var n = slots.filter(function(s) { return s && s.card && s.card.name && s.card.name.trim(); }).length;
  document.getElementById('pg-label').textContent =
    n + ' card' + (n !== 1 ? 's' : '') + ' \xb7 ' + chunks.length + ' page' + (chunks.length !== 1 ? 's' : '');
  applyLastScale();
  requestAnimationFrame(scalePages);
}

// ── UTILS ────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── SAVE PDF ─────────────────────────────────────────
async function savePDF() {
  var pdfBtn = document.getElementById('pdf-btn');
  if (pdfBtn) {
    pdfBtn.disabled = true;
    pdfBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2" stroke-dasharray="8 6" transform="rotate(-90 7 7)"><animateTransform attributeName="transform" type="rotate" from="0 7 7" to="360 7 7" dur="0.8s" repeatCount="indefinite"/></circle></svg> Generating\u2026';
  }

  try {
    var p       = PAPER_DATA[currentPaper];
    var pageWin = p.pageW;  // inches
    var pageHin = p.pageH;  // inches
    // Convert inches → mm for jsPDF
    var pageWmm = pageWin * 25.4;
    var pageHmm = pageHin * 25.4;

    var { jsPDF } = window.jspdf;
    var doc = new jsPDF({
      orientation: pageWin > pageHin ? 'landscape' : 'portrait',
      unit: 'mm',
      format: [pageWmm, pageHmm],
      compress: true
    });

    // Grab all rendered page-wrap divs (the white sheet elements)
    var pageWraps = document.querySelectorAll('#pages-container .page-wrap');
    if (!pageWraps.length) return;

    for (var i = 0; i < pageWraps.length; i++) {
      if (i > 0) doc.addPage([pageWmm, pageHmm],
                              pageWin > pageHin ? 'landscape' : 'portrait');

      var wrap = pageWraps[i];
      // Temporarily strip the CSS scale so html2canvas sees the true pixel size
      var prevTransform = wrap.style.transform;
      wrap.style.transform = 'none';

      var canvas = await html2canvas(wrap, {
        scale: 3,               // 3× supersampling → ~288 effective DPI
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });

      wrap.style.transform = prevTransform;

      var imgData = canvas.toDataURL('image/jpeg', 0.95);
      // Place image to fill the entire PDF page — zero margins, no browser dialog
      doc.addImage(imgData, 'JPEG', 0, 0, pageWmm, pageHmm);
    }

    doc.save('card-templates.pdf');
  } catch (err) {
    alert('PDF generation failed: ' + err.message);
    console.error(err);
  } finally {
    if (pdfBtn) {
      var hasAny = cards.some(function(c) { return c.name && c.name.trim(); });
      pdfBtn.disabled = !hasAny;
      pdfBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none">'
        + '<path d="M2 2.5A1.5 1.5 0 013.5 1h5l3 3v8a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 012 11.5V2.5z" stroke="currentColor" stroke-width="1.2"/>'
        + '<path d="M8.5 1v3h3M5 7.5h4M5 9.5h2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'
        + '</svg> Save PDF';
    }
  }
}

// ── INIT ─────────────────────────────────────────────

function parseCSV(text) {
  var lines = text.split('\n');
  var headers = splitCSVRow(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = splitCSVRow(lines[i]);
    var row = {};
    headers.forEach(function(h, j) { row[h.trim()] = (vals[j] || '').trim(); });
    rows.push(row);
  }
  return rows;
}

function splitCSVRow(row) {
  var result = [];
  var inQuote = false;
  var cur = '';
  for (var i = 0; i < row.length; i++) {
    var c = row[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function buildDataFromSheets(cardRows, setRows, pokemonRows) {
  // Build SET_DATA from sets sheet
  SET_DATA = {};
  setRows.forEach(function(row) {
    var name = row['Set Name'] || row['set_name'] || row['Set'];
    if (!name) return;
    SET_DATA[name] = {};
  });

  // Build SET_CARD_DATA and KNOWN_SETS from cards sheet
  SET_CARD_DATA = {};
  var setsOrder = [];
  cardRows.forEach(function(row) {
    var setName = row['Set'];
    if (!setName) return;
    if (!SET_CARD_DATA[setName]) {
      SET_CARD_DATA[setName] = [];
      setsOrder.push(setName);
    }
    SET_CARD_DATA[setName].push({
      num:      row['Card Number'] || '',
      name:     row['Card Name']   || '',
      printings: row['Variant'] ? row['Variant'].split(',').map(function(v){return v.trim();}).filter(Boolean) : [],
      serials:  [],
      primary:  row['Primary Pokemon'] || '',
      cameo:    row['Cameo Pokemon']   || '',
    });
  });
  KNOWN_SETS = setsOrder;

  // Build POKEMON_LIST from Pokémon sheet, sorted by dex number
  if (pokemonRows && pokemonRows.length) {
    pokemonRows.sort(function(a, b) {
      return parseInt(a['Dex Number'] || a['dex_number'] || 0, 10)
           - parseInt(b['Dex Number'] || b['dex_number'] || 0, 10);
    });
    POKEMON_LIST = pokemonRows.map(function(row) {
      return (row['Name'] || row['name'] || '').trim();
    }).filter(Boolean);
  } else {
    // Fallback: derive from card data
    var pokeSet = {};
    cardRows.forEach(function(row) {
      if (row['Primary Pokemon']) row['Primary Pokemon'].split(',').forEach(function(p){ var t=p.trim(); if(t) pokeSet[t]=1; });
      if (row['Cameo Pokemon'])   row['Cameo Pokemon'].split(',').forEach(function(p){ var t=p.trim(); if(t) pokeSet[t]=1; });
    });
    POKEMON_LIST = Object.keys(pokeSet).sort();
  }

  BASE_SET_CARDS = SET_CARD_DATA['Base Set'] || [];
}

function showLoadingError(msg) {
  var el = document.getElementById('loading-screen');
  if (el) el.innerHTML = '<div style="text-align:center;padding:40px;color:#ff7070;">'
    + '<div style="font-size:1.2rem;margin-bottom:12px;">⚠ Failed to load data</div>'
    + '<div style="font-size:.75rem;color:var(--muted);max-width:400px;margin:0 auto;">' + msg + '</div>'
    + '<div style="margin-top:20px;font-size:.7rem;color:var(--muted2);">Check that your Google Sheets URLs are correct in the CONFIG section of the HTML file.</div>'
    + '</div>';
}

function hideLoadingScreen() {
  var el = document.getElementById('loading-screen');
  if (el) el.style.display = 'none';
  var app = document.querySelector('.app');
  if (app) app.style.display = '';
}

async function loadData() {
  // If no URLs configured, use hardcoded fallback data and just init
  if (!CONFIG.CARDS_SHEET_URL || CONFIG.CARDS_SHEET_URL === 'YOUR_CARDS_SHEET_CSV_URL_HERE') {
    console.warn('Google Sheets URLs not configured — using empty data.');
    hideLoadingScreen();
    setPaper('Letter-L');
    renderForms();
    renderPreview();
    return;
  }

  try {
    var [cardsResp, setsResp, pokemonResp] = await Promise.all([
      fetch(CONFIG.CARDS_SHEET_URL),
      fetch(CONFIG.SETS_SHEET_URL),
      fetch(CONFIG.POKEMON_SHEET_URL),
    ]);

    if (!cardsResp.ok)   throw new Error('Cards sheet returned '   + cardsResp.status);
    if (!setsResp.ok)    throw new Error('Sets sheet returned '    + setsResp.status);
    if (!pokemonResp.ok) throw new Error('Pokémon sheet returned ' + pokemonResp.status);

    var cardsText   = await cardsResp.text();
    var setsText    = await setsResp.text();
    var pokemonText = await pokemonResp.text();

    var cardRows   = parseCSV(cardsText);
    var setRows    = parseCSV(setsText);
    var pokemonRows = parseCSV(pokemonText);

    buildDataFromSheets(cardRows, setRows, pokemonRows);

    hideLoadingScreen();
    setPaper('Letter-L');
    renderForms();
    renderPreview();

  } catch(err) {
    console.error('Failed to load sheet data:', err);
    loadFallbackData();
  }
}
