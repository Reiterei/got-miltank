<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Got Miltank? PTCG Placeholder Generator</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0f0f12;--surface:#18181e;--surface2:#1e1e26;--border:#2a2a36;--accent:#f4bdc3;--accent-dim:rgba(244,189,195,0.09);--text:#f0f0ee;--muted:#8888a0;--muted2:#55556a;--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{width:41px;height:28px;background:transparent;display:grid;place-items:center;flex-shrink:0;}
header h1{font-size:.78rem;font-weight:700;letter-spacing:.06em;}

.app{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}
aside{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow-y:auto;height:100%;}
.sidebar-inner{padding:18px 16px;display:flex;flex-direction:column;gap:18px;flex:1;}
.s-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}

.ctrl{display:flex;flex-direction:column;gap:6px;}
.ctrl label{font-size:.6rem;color:var(--muted);}
.ctrl input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:.68rem;padding:6px 8px;outline:none;transition:border-color .15s;width:100%;}
.ctrl input:focus{border-color:var(--accent);}

.card-form{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:14px;margin-bottom:10px;}
.card-form.collapsed .card-form-body{display:none;}
.card-form-header{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted);cursor:pointer;user-select:none;}
.collapse-btn{background:none;border:none;color:var(--muted);cursor:pointer;}
.remove-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:4px 6px;border-radius:4px;transition:all .15s;}
.remove-btn:hover{color:#ff6b6b;background:rgba(255,107,107,.1);}

.edition-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.edition-pill{padding:4px 10px;border-radius:20px;font-size:.6rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.edition-pill.selected{background:var(--accent);color:#111;border-color:var(--accent);}

.add-card-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1.5px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .15s;width:100%;margin-bottom:20px;}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:7px;font-size:.7rem;font-weight:500;cursor:pointer;border:none;width:100%;transition:all .15s;}
.btn-primary{background:var(--accent);color:#111;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-danger:hover{background:rgba(255,100,100,.1); color:#ff7070;}

#preview{padding:24px 28px;overflow-y:auto;background:var(--bg);height:100%;}
.page-scale-wrap{margin:0 auto 32px; transform-origin: top center;}
.page-wrap{background:white;box-shadow:0 4px 40px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;}
.card-grid{display:grid;}

.card-slot{width:240px; height:336px; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; border: 1px solid transparent;}
.border-dots .corner-dot { display: block; position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #000; z-index: 2; }
.corner-dot.tl { top: 0; left: 0; transform: translate(-50%, -50%); }
.corner-dot.tr { top: 0; right: 0; transform: translate(50%, -50%); }
.corner-dot.bl { bottom: 0; left: 0; transform: translate(-50%, 50%); }
.corner-dot.br { bottom: 0; right: 0; transform: translate(50%, 50%); }

.cs-inner{display:flex; flex-direction:column; align-items:center; width:100%; padding:0 20px;}
.cs-name{font-size:1.85rem; font-weight:700; color:#111; line-height:1.2; margin-bottom:5px;}
.cs-number{font-size:1.45rem; font-weight:700; color:#111; margin-bottom:12px;}
.cs-symbol{width:80px; height:80px; object-fit:contain; margin-bottom:10px;}
.cs-set{font-size:1.2rem; font-weight:700; color:#111; margin-bottom:4px;}
.cs-variant{font-size:1.1rem; color:#333; margin-bottom:2px;}

.card-picker{position:relative;}
.card-picker-dropdown{position:absolute; top:100%; left:0; right:0; z-index:999; background:var(--surface2); border:1px solid var(--accent); border-top:none; max-height:200px; overflow-y:auto; display:none;}
.card-picker-dropdown.open{display:block;}
.card-picker-option{padding:6px 8px; font-size:.66rem; cursor:pointer; color:var(--text);}
.card-picker-option:hover{background:var(--accent-dim); color:var(--accent);}

#loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);position:fixed;width:100%;z-index:9999;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);}
</style>
</head>
<body>

<div id="loading-screen">
  <div style="text-align:center;">
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px;">Loading card data...</div>
    <div style="width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
      <div style="height:100%;background:var(--accent);width:50%;animation:loadbar 1.2s infinite ease-in-out;"></div>
    </div>
  </div>
</div>
<style>@keyframes loadbar{0%{margin-left:-50%}100%{margin-left:100%}}</style>

<header>
  <div class="logo">🐄</div>
  <h1>POKEMON TCG PLACEHOLDER GENERATOR</h1>
</header>

<div class="app">
  <aside>
    <div class="sidebar-inner">
      <div>
        <div class="s-label">Settings</div>
        <div class="ctrl">
          <label>Paper Size</label>
          <select id="paper-select" onchange="setPaper(this.value)" style="width:100%; background:var(--bg); color:white; border:1px solid var(--border); padding:5px;">
            <option value="Letter-L">Letter Landscape</option>
            <option value="Legal-L">Legal Landscape</option>
            <option value="A4-L">A4 Landscape</option>
          </select>
        </div>
      </div>
      
      <div id="pokemon-filter-section"></div>

      <div>
        <div class="s-label">Cards <span id="card-count" style="margin-left:5px; color:var(--accent)">0</span></div>
        <div id="card-forms"></div>
        <button class="add-card-btn" onclick="addCard()">+ Add Card</button>
      </div>

      <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
        <button class="btn btn-ghost btn-danger" id="clear-btn" onclick="clearAll()" style="display:none;">Clear All</button>
        <button class="btn btn-primary" onclick="savePDF()">Save PDF</button>
      </div>
    </div>
  </aside>

  <div id="preview">
    <div id="pages-container"></div>
  </div>
</div>

<script>
// ── CONFIGURATION ────────────────────────────────────
var CONFIG = {
  CARDS_SHEET_URL:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5MUX9FmQ11gYG0UI3M86GguXvcHviaY7XI9ZQXZFpTDurXcpBPB-OXQefBv_h7tGR08mIMprsOMel/pub?gid=0&single=true&output=csv',
  SETS_SHEET_URL:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vStKDQ-Z6Hm5eH5v8qAxuq6w2jGW_jnyeaKcqrgm1HKGCKi4hkqg3Voy4_xOfovthzfM-qduwqVDE6s/pub?gid=727524711&single=true&output=csv',
  POKEMON_SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDzKb6cjvjhYlbU_2-23WzMJ9t2tWOz9n0TePOtiWtX0hZ7i88HnptGvXh7eLz_ANUg_cNv5zFawQ_/pub?gid=1479465458&single=true&output=csv',
};

// ── STATE ───────
var SET_DATA = {}, SET_CARD_DATA = {}, KNOWN_SETS = [], POKEMON_LIST = [];
var cards = [], cardIdCtr = 0, pokemonFilter = '', includeCameo = false, includeSerials = false;
var currentPaper = 'Letter-L', currentBorderType = 'dots', collapsedIds = {};
var PAPER_DATA = {
  'Letter-L': { css:'letter landscape', pageW:11.0, pageH:8.5, margin:0.5, cols:3, rows:2 },
  'Legal-L':  { css:'legal landscape',  pageW:14.0, pageH:8.5, margin:0.5, cols:4, rows:2 },
  'A4-L':     { css:'A4 landscape',     pageW:11.69, pageH:8.27, margin:0.35, cols:4, rows:2 },
};
var CARD_W_PX = 240, CARD_H_PX = 336, DPI = 96;
var BLANK_SYMBOL_URI = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="14" fill="%23ddd"/></svg>';

function getSymbolUrl(setName) {
  var info = SET_DATA[setName];
  return info && info.icon ? 'symbols/' + info.icon : BLANK_SYMBOL_URI;
}

// ── CORE LOGIC ───────────────────────────────────────

function addCard(data) {
  data = data || {};
  cards.push({
    id: ++cardIdCtr,
    name: data.name || '',
    cardNum: data.cardNum || '',
    set: data.set || '',
    selectedVariants: data.selectedVariants || [],
    selectedSerials: data.selectedSerials || [],
    customNotes: data.customNotes || []
  });
  renderForms();
  renderPreview();
}

function duplicateCard(id) {
  var original = cards.find(c => c.id === id);
  if (!original) return;
  var copy = JSON.parse(JSON.stringify(original));
  copy.id = ++cardIdCtr;
  cards.splice(cards.indexOf(original) + 1, 0, copy);
  renderForms(); renderPreview();
}

function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  renderForms(); renderPreview();
}

function toggleOption(id, value, type) {
  var c = cards.find(c => c.id === id);
  if (!c) return;
  var target = (type === 'serial') ? 'selectedSerials' : 'selectedVariants';
  if (!c[target]) c[target] = [];
  var idx = c[target].indexOf(value);
  if (idx === -1) c[target].push(value);
  else c[target].splice(idx, 1);
  renderForms(); renderPreview();
}

function toggleCameo(val) { includeCameo = val; renderForms(); renderPreview(); }
function toggleSerials(val) { includeSerials = val; renderForms(); renderPreview(); }

function saveToStorage() {
  localStorage.setItem('gotMiltank_backup', JSON.stringify({ cards, cardIdCtr, pokemonFilter, includeCameo, includeSerials }));
}

function clearAll() {
  if (!confirm("Clear all cards?")) return;
  cards = []; localStorage.removeItem('gotMiltank_backup');
  renderForms(); renderPreview();
}

// ── PICKERS ──────────────────────────────────────────
var activePicker = { type: null, id: null };

document.addEventListener('mousedown', function(e) {
  if (!activePicker.type) return;
  var drop = document.querySelector('.card-picker-dropdown.open');
  if (drop && !drop.contains(e.target) && !e.target.classList.contains('card-picker-input')) {
    activePicker = { type: null, id: null };
    renderForms();
  }
});

function openPicker(type, id) {
  activePicker = { type, id };
  renderForms();
  setTimeout(() => {
    var input = document.getElementById(`${type}-input-${id}`);
    if (input) { input.removeAttribute('readonly'); input.value = ''; input.focus(); }
    var drop = document.getElementById(`${type}-drop-${id}`);
    if (drop) drop.classList.add('open');
  }, 10);
}

// ── UI RENDERING ─────────────────────────────────────

function renderForms() {
  var container = document.getElementById('card-forms');
  document.getElementById('card-count').textContent = cards.length;
  document.getElementById('clear-btn').style.display = cards.length > 0 ? '' : 'none';

  var pf = document.getElementById('pokemon-filter-section');
  if (pf) {
    pf.innerHTML = `<div class="ctrl" style="margin-bottom:8px;"><label>Species Filter</label>
      <div class="card-picker">
        <input type="text" class="card-picker-input" id="poke-input-global" value="${esc(pokemonFilter || 'All Pokémon')}" readonly onmousedown="openPicker('poke', 'global')" oninput="updatePokeDrop(this.value)"/>
        <div class="card-picker-dropdown" id="poke-drop-global"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted);cursor:pointer;"><input type="checkbox" ${includeCameo ? 'checked' : ''} onchange="toggleCameo(this.checked)"/>Include Cameos</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted);cursor:pointer;"><input type="checkbox" ${includeSerials ? 'checked' : ''} onchange="toggleSerials(this.checked)"/>Include EX Serials</label>
      </div></div>`;
  }

  container.innerHTML = cards.map((card, idx) => {
    var scd = SET_CARD_DATA[card.set] || [];
    var scCard = card.cardKey >= 0 ? scd[card.cardKey] : null;
    var rawVariants = scCard ? scCard.variants : [];
    var rawSerials = scCard ? scCard.serials : [];
    
    var displayOptions = (includeSerials && rawSerials.length > 0) 
      ? rawSerials.map(s => ({val: s, type: 'serial'})).concat(rawVariants.filter(v => v !== 'Normal').map(v => ({val: v, type: 'variant'})))
      : rawVariants.map(v => ({val: v, type: 'variant'}));

    var variantHTML = displayOptions.length ? `<div class="edition-pills">${displayOptions.map(opt => {
        var isSel = (card.selectedVariants || []).indexOf(opt.val) !== -1 || (card.selectedSerials || []).indexOf(opt.val) !== -1;
        return `<button class="edition-pill${isSel ? ' selected' : ''}" onclick="toggleOption(${card.id}, '${esc(opt.val)}', '${opt.type}')">${esc(opt.val)}</button>`;
      }).join('')}</div>` : '';

    return `<div class="card-form" id="form-${card.id}">
      <div class="card-form-header" onclick="toggleCollapse(${card.id})">
        <span><span style="color:var(--accent);">#${idx+1}</span> <span style="margin-left:5px;">${esc(card.name || 'New Card')}</span></span>
        <div>
          <button class="remove-btn" onclick="event.stopPropagation(); duplicateCard(${card.id})">📋</button>
          <button class="remove-btn" onclick="event.stopPropagation(); removeCard(${card.id})">✕</button>
        </div>
      </div>
      <div class="card-form-body">
        <div class="ctrl"><label>Set</label>
          <div class="card-picker">
            <input type="text" id="set-input-${card.id}" class="card-picker-input" value="${esc(card.set)}" readonly onmousedown="openPicker('set', ${card.id})" oninput="updateSetDrop(${card.id}, this.value)"/>
            <div class="card-picker-dropdown" id="set-drop-${card.id}"></div>
          </div>
        </div>
        ${card.set ? `<div class="ctrl"><label>Card Name</label>
          <div class="card-picker">
            <input type="text" id="card-input-${card.id}" class="card-picker-input" value="${scCard ? esc(scCard.num + ' — ' + scCard.name) : ''}" readonly onmousedown="openPicker('card', ${card.id})" oninput="updateCardDrop(${card.id}, this.value)"/>
            <div class="card-picker-dropdown" id="card-drop-${card.id}"></div>
          </div>
        </div>` : ''}
        ${variantHTML}
        ${card.cardKey >= 0 ? `<div class="ctrl" style="margin-top:5px;"><input type="text" placeholder="Custom Note (e.g. Misprint)" value="${esc(card.customNotes[0]||'')}" oninput="updateNote(${card.id}, this.value)"/></div>` : ''}
      </div></div>`;
  }).join('');
  saveToStorage();
}

// ── DROPDOWN UPDATERS ───────────────────────────────

function updatePokeDrop(f) {
  var html = `<div class="card-picker-option" onmousedown="pickPoke('All')">All Pokémon</div>`;
  POKEMON_LIST.filter(p => !f || p.toLowerCase().includes(f.toLowerCase())).forEach(p => {
    html += `<div class="card-picker-option" onmousedown="pickPoke('${p.replace(/'/g, "\\'")}')">${esc(p)}</div>`;
  });
  document.getElementById('poke-drop-global').innerHTML = html;
}
function pickPoke(n) { pokemonFilter = (n==='All'?'':n); activePicker={type:null,id:null}; renderForms(); renderPreview(); }

function updateSetDrop(id, f) {
  var sets = setsForPokemon().filter(s => !f || s.toLowerCase().includes(f.toLowerCase()));
  document.getElementById(`set-drop-${id}`).innerHTML = sets.map(s => `<div class="card-picker-option" onmousedown="pickSet(${id}, '${s.replace(/'/g, "\\'")}')">${esc(s)}</div>`).join('');
}
function pickSet(id, s) { var c=cards.find(c=>c.id===id); c.set=s; c.cardKey=-1; c.name=''; c.selectedVariants=[]; c.selectedSerials=[]; activePicker={type:null,id:null}; renderForms(); }

function updateCardDrop(id, f) {
  var c = cards.find(card => card.id === id);
  var html = (SET_CARD_DATA[c.set]||[]).map((card, idx) => {
    var label = card.num + ' — ' + card.name;
    return ((!f || label.toLowerCase().includes(f.toLowerCase())) && matchesPokemonFilter(card)) ? `<div class="card-picker-option" onmousedown="pickCard(${id}, ${idx})">${esc(label)}</div>` : '';
  }).join('');
  document.getElementById(`card-drop-${id}`).innerHTML = html;
}
function pickCard(id, idx) { var c=cards.find(c=>c.id===id); var bc=SET_CARD_DATA[c.set][idx]; c.cardKey=idx; c.name=bc.name; c.cardNum=bc.num.split('/')[0]; activePicker={type:null,id:null}; renderForms(); renderPreview(); }

function updateNote(id, v) { var c=cards.find(c=>c.id===id); c.customNotes[0]=v; renderPreview(); }
function toggleCollapse(id) { document.getElementById('form-'+id).classList.toggle('collapsed'); }

function matchesPokemonFilter(card) {
  if (!pokemonFilter) return true;
  var f = pokemonFilter.toLowerCase();
  if (card.primary && card.primary.toLowerCase().split(',').some(s=>s.trim()===f)) return true;
  if (includeCameo && card.cameo && card.cameo.toLowerCase().split(',').some(s=>s.trim()===f)) return true;
  return false;
}
function setsForPokemon() {
  if (!pokemonFilter) return KNOWN_SETS;
  return KNOWN_SETS.filter(s => SET_CARD_DATA[s] && SET_CARD_DATA[s].some(matchesPokemonFilter));
}

// ── PREVIEW & PDF ────────────────────────────────────

function renderPreview() {
  var container = document.getElementById('pages-container');
  var p = PAPER_DATA[currentPaper];
  var perPage = p.cols * p.rows;
  var slots = [];
  
  cards.forEach(cd => {
    if (!cd.name) return;
    var cardData = SET_CARD_DATA[cd.set] ? SET_CARD_DATA[cd.set][cd.cardKey] : null;
    var hasSerials = cardData && cardData.serials.length > 0;
    var v = cd.selectedVariants || [], s = cd.selectedSerials || [];
    if (includeSerials && hasSerials) v = v.filter(x => x !== 'Normal');
    
    if (v.length + s.length === 0) slots.push({ card: cd });
    else {
      v.forEach(val => slots.push({ card: cd, variant: val }));
      s.forEach(val => slots.push({ card: cd, serial: val }));
    }
    if (cd.customNotes[0]) slots.push({ card: cd, customNote: cd.customNotes[0] });
  });

  if (!slots.length) { container.innerHTML = '<div class="empty-state">No cards added</div>'; return; }

  var chunks = [];
  for (var i = 0; i < slots.length; i += perPage) {
    var chunk = slots.slice(i, i + perPage);
    while (chunk.length < perPage) chunk.push(null);
    chunks.push(chunk);
  }

  container.innerHTML = chunks.map((chunk, pi) => `
    <div class="page-scale-wrap" style="width:${p.pageW*DPI}px; height:${p.pageH*DPI}px;">
      <div class="page-wrap" style="width:${p.pageW*DPI}px; height:${p.pageH*DPI}px; padding:${p.margin*DPI}px;">
        <div class="card-grid" style="grid-template-columns:repeat(${p.cols},${CARD_W_PX}px); grid-template-rows:repeat(${p.rows},${CARD_H_PX}px);">
          ${chunk.map(s => renderSlot(s)).join('')}
        </div>
      </div>
    </div>`).join('');
  scalePages();
}

function renderSlot(s) {
  if (!s) return '<div class="card-slot border-dots"><span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span></div>';
  var card = s.card;
  return `<div class="card-slot border-dots">
    <span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span>
    <div class="cs-inner">
      <div class="cs-name">${esc(card.name)}</div>
      <div class="cs-number">${esc(card.cardNum || '—')}</div>
      <img class="cs-symbol" src="${getSymbolUrl(card.set)}"/>
      <div class="cs-set">${esc(card.set)}</div>
      ${s.variant && s.variant !== 'Normal' ? `<div class="cs-variant">${esc(s.variant)}</div>` : ''}
      ${s.serial ? `<div class="cs-variant">${esc(s.serial)}</div>` : ''}
      ${s.customNote ? `<div class="cs-variant">${
