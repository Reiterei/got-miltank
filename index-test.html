/* ── CARD SLOT: 2.5" x 3.5" = 240 x 336px ───────────────────────────
   Layout mirrors the preview image:
   - No border between cards, only small corner cut marks
   - Name: large bold, top area
   - Number: bold, below name
   - Symbol: large, centered, generous space
   - Set name: bold, not italic
   - Edition: small, normal weight
   - Code: small, italic, in parens
-------------------------------------------------------------------- */
.card-slot{
  width:240px; height:336px;
  background:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  overflow:visible; flex-shrink:0;
  position:relative;
  /* No border — cut marks only */
}

/* Corner cut marks — four real elements, one per corner.
   html2canvas does not support box-shadow on pseudo-elements
   or CSS outline, so we use inset border + per-corner spans. */

/* Default: no border, dots only (shown via .corner-dot spans) */
.card-slot { border: 1px solid transparent; }

/* Border type variants */
.border-solid .card-slot  { border: 1px solid #999; }
.border-dotted .card-slot { border: 1px dashed #999; }
.border-none .card-slot   { border: 1px solid transparent; }

/* Dots mode: hide the border, show corner dots */
.border-dots .card-slot   { border: 1px solid transparent; }

/* Suppress the old ::before pseudo-element entirely */
.card-slot::before { display: none !important; }

/* Corner dot spans injected by JS */
.corner-dot {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #000;
  z-index: 2;
  /* hidden by default; shown only in dots mode */
  display: none;
}
.border-dots .corner-dot { display: block; }
.corner-dot.tl { top: 0; left: 0; transform: translate(-50%, -50%); }
.corner-dot.tr { top: 0; right: 0; transform: translate(50%, -50%); }
.corner-dot.bl { bottom: 0; left: 0; transform: translate(-50%, 50%); }
.corner-dot.br { bottom: 0; right: 0; transform: translate(50%, 50%); }

.card-slot.empty{
  background:white;
  display:flex; align-items:center; justify-content:center;
}
.card-slot.empty::after{
  content:"BLANK";
  font-size:1.6rem;
  font-weight:700;
  color:#ddd;
  letter-spacing:.15em;
}
.card-slot.empty .empty-slot-label{ display:none; }
.empty-slot-label{
  color:#d0d0d0; font-size:.54rem; font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
}

/* Card content wrapper — vertically centered group */
.cs-inner{
  display:flex; flex-direction:column; align-items:center;
  width:100%; padding:0 20px;
  gap:0; overflow:hidden;
}

/* Name: large, bold, serif-adjacent feel */
.cs-name{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.85rem; font-weight:700;
  color:#111; line-height:1.2;
  margin-bottom:5px;
  width:100%;
}

/* Number: bold, prominent */
.cs-number{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.45rem; font-weight:700;
  color:#111;
  margin-bottom:12px;
}
.cs-number.blank{ color:#ccc; font-weight:400; font-size:1.25rem; margin-bottom:12px; }

/* Symbol: large, centered */
.cs-symbol-wrap{
  width:84px; height:84px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
}
.cs-symbol{ width:80px; height:80px; object-fit:contain; }
.cs-symbol-placeholder{
  width:60px; height:60px;
  border:2px dashed #ddd; border-radius:6px;
  display:grid; place-items:center;
  color:#ccc; font-size:.5rem;
}

/* Set name: bold, not italic */
.cs-set{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
  font-size:1.2rem; font-weight:700;
  color:#111; line-height:1.3;
  margin-bottom:4px;
}

/* Edition: smaller, normal weight */
.cs-edition{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}

/* Code: small, italic */
.cs-holo{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}
.cs-variant{
  font-size:1.1rem; font-weight:400;
  color:#333;
  margin-bottom:2px;
}
.cs-code{
  font-size:1.05rem; font-style:italic;
  color:#555;
}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;text-align:center;}
.empty-icon{width:60px;height:60px;border:1.5px dashed var(--border);border-radius:12px;display:grid;place-items:center;}
.empty-state h3{font-size:.85rem;color:var(--muted);font-weight:400;}
.empty-state p{font-size:.65rem;color:var(--muted);opacity:.7;}

@media print {
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;margin:0;}
  header,aside,.preview-top,.page-label{display:none!important;}
  .app{display:block!important;}
  #preview{padding:0!important;background:white!important;overflow:visible!important;}
  .page-wrap{box-shadow:none!important;border-radius:0!important;page-break-after:always;break-after:page;margin:0!important;}
  .page-wrap:last-child{page-break-after:avoid;break-after:avoid;}
  .card-slot{break-inside:avoid;page-break-inside:avoid;}
  .empty-state{display:none!important;}
}

/* Searchable card picker */
.card-picker{position:relative;}
.card-picker-input{
  width:100%;background:var(--bg);border:1px solid var(--border);

.card-picker-input:read-only{cursor:pointer;caret-color:transparent;}

.card-picker-dropdown{

.card-picker-option.no-results{color:var(--muted);cursor:default;}

// ── CONFIGURATION ────────────────────────────────────
var CONFIG = {
  CARDS_SHEET_URL:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5MUX9FmQ11gYG0UI3M86GguXvcHviaY7XI9ZQXZFpTDurXcpBPB-OXQefBv_h7tGR08mIMprsOMel/pub?gid=0&single=true&output=csv',
  SETS_SHEET_URL:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vStKDQ-Z6Hm5eH5v8qAxuq6w2jGW_jnyeaKcqrgm1HKGCKi4hkqg3Voy4_xOfovthzfM-qduwqVDE6s/pub?gid=727524711&single=true&output=csv',
  POKEMON_SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDzKb6cjvjhYlbU_2-23WzMJ9t2tWOz9n0TePOtiWtX0hZ7i88HnptGvXh7eLz_ANUg_cNv5zFawQ_/pub?gid=1479465458&single=true&output=csv',
};

// ── DATA ───────
var SET_DATA      = {};
var SET_CARD_DATA = {};
var KNOWN_SETS    = [];
var POKEMON_LIST  = [];
var BASE_SET_CARDS = [];
var BLANK_SYMBOL_URI = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="14" fill="%23ddd"/></svg>';

function getSymbolUrl(setName) {
  var info = SET_DATA[setName];
  var icon = info && info.icon ? info.icon : 'Base_Set.png';
  return 'symbols/' + icon;
}

// ── PAPER CONFIG ─────────────────────────────────────
var PAPER_DATA = {
  'Letter-L':  { css:'letter landscape',  pageW:11.0,  pageH:8.5,   margin:0.5,  cols:3, rows:2 },
  'Legal-L':   { css:'legal landscape',   pageW:14.0,  pageH:8.5,   margin:0.5,  cols:4, rows:2 },
  'A4-L':      { css:'A4 landscape',      pageW:11.69, pageH:8.27,  margin:0.35, cols:4, rows:2 },
};

var CARD_W_PX    = 240;
var CARD_H_PX    = 336;
var DPI          = 96;
var cards        = [];
var cardIdCtr    = 0;
var pokemonFilter = '';
var includeCameo = false;
var includeSerials = false;
var currentPaper = 'Letter-L';
var currentBorderType = 'dots';
var collapsedIds = {};

// ── CORE LOGIC ───────────────────────────────────────

function addCard(data) {
  data = data || {};
  cards.push({
    id: ++cardIdCtr,
    name: data.name || '',
    cardNum: data.cardNum || '',
    set: data.set || '',
    selectedVariants: data.selectedVariants || [],
    selectedSerials: data.selectedSerials || [],
    code: data.code || '',
    cardKey: typeof data.cardKey !== 'undefined' ? data.cardKey : -1,
    customNotes: data.customNotes || []
  });
  renderForms();
  renderPreview();
}

function duplicateCard(id) {
  var original = cards.find(c => c.id === id);
  if (!original) return;
  var copy = JSON.parse(JSON.stringify(original));
  copy.id = ++cardIdCtr;
  cards.splice(cards.indexOf(original) + 1, 0, copy);
  renderForms();
  renderPreview();
}

function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  renderForms();
  renderPreview();
}

function toggleOption(btn, value, type) {
  var id = parseInt(btn.closest('.card-form').dataset.cardid);
  var c = cards.find(c => c.id === id);
  if (!c) return;
  var target = (type === 'serial') ? 'selectedSerials' : 'selectedVariants';
  if (!c[target]) c[target] = [];
  var idx = c[target].indexOf(value);
  if (idx === -1) c[target].push(value);
  else c[target].splice(idx, 1);
  renderForms();
  renderPreview();
}

function toggleCameo(val) { includeCameo = val; renderForms(); renderPreview(); }
function toggleSerials(val) { includeSerials = val; renderForms(); renderPreview(); }

function saveToStorage() {
  var data = { cards, cardIdCtr, pokemonFilter, includeCameo, includeSerials };
  localStorage.setItem('gotMiltank_backup', JSON.stringify(data));
}

function clearAll() {
  if (!confirm("Clear all cards?")) return;
  cards = [];
  localStorage.removeItem('gotMiltank_backup');
  renderForms();
  renderPreview();
}

// ── PICKERS ──────────────────────────────────────────
var activePickerId = null;
var activeSetPickerId = null;
var activePokemonPickerId = null;

document.addEventListener('mousedown', function(e) {
  if (activePokemonPickerId) {
    if (!document.getElementById('poke-picker-drop-global').contains(e.target)) closePokemonPicker();
  }
  if (activeSetPickerId) {
    if (!document.getElementById('set-picker-drop-' + activeSetPickerId).contains(e.target)) closeSetPicker(activeSetPickerId);
  }
  if (activePickerId) {
    if (!document.getElementById('picker-drop-' + activePickerId).contains(e.target)) closeCardPicker(activePickerId);
  }
});

function openPokemonPickerMousedown(e) { e.preventDefault(); openPokemonPicker(); }
function openPokemonPicker() {
  activePokemonPickerId = 'global';
  var input = document.getElementById('poke-picker-input-global');
  input.removeAttribute('readonly'); input.value = ''; input.focus();
  document.getElementById('poke-picker-drop-global').classList.add('open');
}
function closePokemonPicker() {
  activePokemonPickerId = null;
  var input = document.getElementById('poke-picker-input-global');
  input.value = pokemonFilter || 'All'; input.setAttribute('readonly', '');
  document.getElementById('poke-picker-drop-global').classList.remove('open');
}

function pickPokemon(e, uid, name) {
  e.preventDefault();
  pokemonFilter = (name === 'All') ? '' : name;
  closePokemonPicker();
  renderForms();
  renderPreview();
}

function buildPokemonOptions(filter) {
  var f = filter.toLowerCase();
  var opts = '<div class="card-picker-option" onmousedown="pickPokemon(event, \'global\', \'All\')">All (Show All Sets)</div>';
  POKEMON_LIST.forEach((p, i) => {
    var label = '#' + String(i + 1).padStart(4, '0') + ' - ' + p;
    if (!f || label.toLowerCase().includes(f)) {
      opts += `<div class="card-picker-option" onmousedown="pickPokemon(event, 'global', '${p.replace(/'/g, "\\'")}')">${esc(label)}</div>`;
    }
  });
  return opts;
}

function openSetPickerMousedown(e, id) { e.preventDefault(); activeSetPickerId = id; document.getElementById('set-picker-drop-'+id).classList.add('open'); }
function closeSetPicker(id) { activeSetPickerId = null; document.getElementById('set-picker-drop-'+id).classList.remove('open'); }
function pickSet(e, id, setName) {
  e.preventDefault();
  var c = cards.find(c => c.id === id);
  if (c) { 
    c.set = setName; c.cardKey = -1; c.name = ''; c.selectedVariants = []; c.selectedSerials = []; 
  }
  closeSetPicker(id); renderForms(); renderPreview();
}

function openCardPickerMousedown(e, id) { e.preventDefault(); activePickerId = id; document.getElementById('picker-drop-'+id).classList.add('open'); }
function closeCardPicker(id) { activePickerId = null; document.getElementById('picker-drop-'+id).classList.remove('open'); }
function pickCard(e, id, idx) {
  e.preventDefault();
  var c = cards.find(c => c.id === id);
  var bc = SET_CARD_DATA[c.set][idx];
  c.cardKey = idx; c.name = bc.name; c.cardNum = bc.num.split('/')[0];
  closeCardPicker(id); renderForms(); renderPreview();
}

function matchesPokemonFilter(card) {
  if (!pokemonFilter) return true;
  var f = pokemonFilter.toLowerCase();
  if (card.primary && card.primary.toLowerCase().split(',').map(s=>s.trim()).includes(f)) return true;
  if (includeCameo && card.cameo && card.cameo.toLowerCase().split(',').map(s=>s.trim()).includes(f)) return true;
  return false;
}

function setsForPokemon() {
  if (!pokemonFilter) return KNOWN_SETS;
  return KNOWN_SETS.filter(s => SET_CARD_DATA[s] && SET_CARD_DATA[s].some(matchesPokemonFilter));
}

// ── UI RENDERING ─────────────────────────────────────

function renderForms() {
  var container = document.getElementById('card-forms');
  document.getElementById('card-count').textContent = cards.length;
  document.getElementById('clear-btn').style.display = cards.length > 0 ? '' : 'none';

  var pf = document.getElementById('pokemon-filter-section');
  if (pf) {
    pf.innerHTML = `<div class="ctrl" style="margin-bottom:8px;"><label>Pokémon</label>
      <div class="card-picker">
        <input type="text" class="card-picker-input" id="poke-picker-input-global" value="${esc(pokemonFilter || 'All')}" readonly onmousedown="openPokemonPickerMousedown(event)" oninput="document.getElementById('poke-picker-drop-global').innerHTML = buildPokemonOptions(this.value)"/>
        <div class="card-picker-dropdown" id="poke-picker-drop-global">${buildPokemonOptions('')}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted);cursor:pointer;"><input type="checkbox" ${includeCameo ? 'checked' : ''} onchange="toggleCameo(this.checked)"/>Include Cameo Cards</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted);cursor:pointer;"><input type="checkbox" ${includeSerials ? 'checked' : ''} onchange="toggleSerials(this.checked)"/>Include EX Serial Numbers</label>
      </div></div>`;
  }

  container.innerHTML = cards.map((card, idx) => {
    var scCard = (SET_CARD_DATA[card.set] && card.cardKey >= 0) ? SET_CARD_DATA[card.set][card.cardKey] : null;
    var rawVariants = scCard ? scCard.variants : [];
    var rawSerials = scCard ? scCard.serials : [];
    var displayOptions = (includeSerials && rawSerials.length > 0) 
      ? rawSerials.map(s => ({val: s, type: 'serial'})).concat(rawVariants.filter(v => v !== 'Normal').map(v => ({val: v, type: 'variant'})))
      : rawVariants.map(v => ({val: v, type: 'variant'}));

    var variantHTML = displayOptions.length ? `<div class="ctrl"><label>Variants</label><div class="edition-pills">${displayOptions.map(opt => {
        var isSel = (card.selectedVariants || []).indexOf(opt.val) !== -1 || (card.selectedSerials || []).indexOf(opt.val) !== -1;
        return `<button class="edition-pill${isSel ? ' selected' : ''}" onclick="toggleOption(this, '${esc(opt.val)}', '${opt.type}')">${esc(opt.val)}</button>`;
      }).join('')}</div></div>` : '';

    return `<div class="card-form" id="form-${card.id}" data-cardid="${card.id}">
      <div class="card-form-header" onclick="toggleCardCollapse(${card.id},event)">
        <span style="display:flex;align-items:center;gap:4px;"><button class="collapse-btn">&#9660;</button><span style="color:var(--accent);">Card #${idx+1}</span><span style="color:var(--muted);margin-left:6px;">${esc(card.name)}</span></span>
        <div style="display:flex;gap:4px;"><button class="remove-btn" onclick="event.stopPropagation(); duplicateCard(${card.id})">Duplicate</button><button class="remove-btn" onclick="removeCard(${card.id})">&#x2715;</button></div>
      </div>
      <div class="card-form-body">
        <div class="ctrl"><label>Set Name</label>
          <div class="card-picker">
            <input type="text" class="card-picker-input" value="${esc(card.set)}" readonly onmousedown="openSetPickerMousedown(event, ${card.id})"/>
            <div class="card-picker-dropdown" id="set-picker-drop-${card.id}">${setsForPokemon().map(s => `<div class="card-picker-option" onmousedown="pickSet(event, ${card.id}, '${s.replace(/'/g, "\\'")}')">${esc(s)}</div>`).join('')}</div>
          </div>
        </div>
        ${card.set ? `<div class="ctrl"><label>Card</label>
          <div class="card-picker">
            <input type="text" class="card-picker-input" value="${scCard ? esc(scCard.num + ' — ' + scCard.name) : ''}" readonly onmousedown="openCardPickerMousedown(event, ${card.id})"/>
            <div class="card-picker-dropdown" id="picker-drop-${card.id}">${(SET_CARD_DATA[card.set]||[]).map((c, i) => matchesPokemonFilter(c) ? `<div class="card-picker-option" onmousedown="pickCard(event, ${card.id}, ${i})">${esc(c.num + ' — ' + c.name)}</div>` : '').join('')}</div>
          </div>
        </div>` : ''}
        ${variantHTML}
        ${card.cardKey >= 0 ? `<div class="ctrl"><label>Custom Variant</label><input type="text" value="${esc(card.customNotes[0]||'')}" oninput="updateCustomNote(this, ${card.id}, 0)"/></div>` : ''}
      </div></div>`;
  }).join('');
  saveToStorage();
}

function updateCustomNote(el, id, idx) {
  var c = cards.find(c => c.id === id);
  if (c) { c.customNotes[idx] = el.value; renderPreview(); }
}

function toggleCardCollapse(id, e) {
  if (e.target.classList.contains('remove-btn')) return;
  var form = document.getElementById('form-' + id);
  if (form) { form.classList.toggle('collapsed'); collapsedIds[id] = form.classList.contains('collapsed'); }
}

// ── PREVIEW ──────────────────────────────────────────

function renderPreview() {
  var container = document.getElementById('pages-container');
  var p = PAPER_DATA[currentPaper];
  var perPage = p.cols * p.rows;
  var pageWpx = Math.round(p.pageW * DPI), pageHpx = Math.round(p.pageH * DPI), marginPx = Math.round(p.margin * DPI);

  var slots = [];
  cards.forEach(cd => {
    if (!cd.name) return;
    var scd = SET_CARD_DATA[cd.set], cardData = (scd && cd.cardKey >= 0) ? scd[cd.cardKey] : null;
    var hasSerials = cardData && cardData.serials.length > 0;
    var selVars = cd.selectedVariants || [], selSers = cd.selectedSerials || [];
    
    if (includeSerials && hasSerials) selVars = selVars.filter(v => v !== 'Normal');

    var selections = selVars.map(v => ({val: v, type: 'variant'})).concat(selSers.map(s => ({val: s, type: 'serial'})));
    if (selections.length === 0) slots.push({ card: cd });
    else selections.forEach(sel => slots.push({ card: cd, variant: sel.type==='variant'?sel.val:null, serial: sel.type==='serial'?sel.val:null }));
    
    (cd.customNotes || []).forEach(note => { if(note && note.trim()) slots.push({ card: cd, customNote: note.trim() }); });
  });

  if (slots.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No cards yet</h3></div>';
    document.getElementById('pg-label').textContent = '0 cards';
    return;
  }

  var chunks = [];
  for (var i = 0; i < slots.length; i += perPage) {
    var chunk = slots.slice(i, i + perPage);
    while (chunk.length < perPage) chunk.push(null);
    chunks.push(chunk);
  }

  container.innerHTML = chunks.map((chunk, pi) => `
    <div class="page-label">Page ${pi + 1} of ${chunks.length}</div>
    <div class="page-scale-wrap" data-page-w="${pageWpx}" data-page-h="${pageHpx}">
      <div class="page-wrap" style="width:${pageWpx}px;height:${pageHpx}px;padding:${marginPx}px;">
        <div class="card-grid border-${currentBorderType}" style="grid-template-columns:repeat(${p.cols},${CARD_W_PX}px);grid-template-rows:repeat(${p.rows},${CARD_H_PX}px);">
          ${chunk.map(s => renderSlot(s ? s.card : null, null, null, s ? s.variant : null, s ? s.customNote : null, s ? s.serial : null)).join('')}
        </div>
      </div>
    </div>`).join('');

  document.getElementById('pg-label').textContent = slots.length + ' cards · ' + chunks.length + ' pages';
  applyLastScale();
  requestAnimationFrame(scalePages);
}

function renderSlot(card, ed, dummy, variant, note, serial) {
  if (!card) return '<div class="card-slot empty"><span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span></div>';
  var sym = getSymbolUrl(card.set);
  return `<div class="card-slot">
    <span class="corner-dot tl"></span><span class="corner-dot tr"></span><span class="corner-dot bl"></span><span class="corner-dot br"></span>
    <div class="cs-inner">
      <div class="cs-name">${esc(card.name)}</div>
      <div class="cs-number">${esc(card.num || card.cardNum || '—')}</div>
      <div class="cs-symbol-wrap"><img class="cs-symbol" src="${sym}" onerror="this.src='${BLANK_SYMBOL_URI}'"/></div>
      <div class="cs-set">${esc(card.set || '—')}</div>
      ${variant && variant !== 'Normal' ? `<div class="cs-variant">${esc(variant)}</div>` : ''}
      ${serial ? `<div class="cs-variant">${esc(serial)}</div>` : ''}
      ${note ? `<div class="cs-variant">${esc(note)}</div>` : ''}
    </div></div>`;
}

// ── UTILS & PDF ──────────────────────────────────────

function setPaper(name) {
  currentPaper = name;
  var p = PAPER_DATA[name];
  var el = document.getElementById('print-page-style') || document.createElement('style');
  el.id = 'print-page-style'; document.head.appendChild(el);
  el.textContent = `@media print { @page { size: ${p.css}; margin: ${p.margin}in; } }`;
  renderPreview();
}

function setBorderType(t) { currentBorderType = t; renderPreview(); }

function scalePages() {
  var wraps = document.querySelectorAll('.page-scale-wrap');
  var availW = document.getElementById('preview').offsetWidth - 60;
  wraps.forEach(wrap => {
    var pageW = wrap.dataset.pageW, scale = Math.min(1, availW / pageW);
    wrap.querySelector('.page-wrap').style.transform = `scale(${scale})`;
    wrap.style.width = (pageW * scale) + 'px';
    wrap.style.height = (wrap.dataset.pageH * scale) + 'px';
  });
}
function applyLastScale() { requestAnimationFrame(scalePages); }
window.addEventListener('resize', scalePages);

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

async function savePDF() {
  var btn = document.getElementById('pdf-btn'); btn.disabled = true; btn.innerHTML = 'Generating...';
  try {
    var p = PAPER_DATA[currentPaper], pageWmm = p.pageW * 25.4, pageHmm = p.pageH * 25.4;
    var { jsPDF } = window.jspdf;
    var doc = new jsPDF({ orientation: p.pageW > p.pageH ? 'landscape' : 'portrait', unit: 'mm', format: [pageWmm, pageHmm], compress: true });
    var wraps = document.querySelectorAll('.page-wrap');
    for (var i = 0; i < wraps.length; i++) {
      if (i > 0) doc.addPage([pageWmm, pageHmm], p.pageW > p.pageH ? 'landscape' : 'portrait');
      wraps[i].style.transform = 'none';
      var canvas = await html2canvas(wraps[i], { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
      doc.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, pageWmm, pageHmm);
      applyLastScale();
    }
    doc.save('cards.pdf');
  } catch (e) { alert(e.message); }
  btn.disabled = false; btn.innerHTML = 'Save PDF';
}

function parseCSV(text) {
  var rows = [], lines = text.split('\n'), headers = splitCSVRow(lines[0]);
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = splitCSVRow(lines[i]), row = {};
    headers.forEach((h, j) => row[h.trim()] = (vals[j] || '').trim());
    rows.push(row);
  }
  return rows;
}

function splitCSVRow(row) {
  var res = [], inQ = false, cur = '';
  for (var i = 0; i < row.length; i++) {
    if (row[i] === '"') inQ = !inQ;
    else if (row[i] === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += row[i];
  }
  res.push(cur); return res;
}

function buildDataFromSheets(cardRows, setRows, pokemonRows) {
  SET_DATA = {}; setRows.forEach(r => { var n = r['Set Name'] || r['Set']; if(n) SET_DATA[n] = { icon: r['Icon'] }; });
  SET_CARD_DATA = {}; var setsOrder = [];
  cardRows.forEach(r => {
    var s = r['Set']; if(!s) return;
    if (!SET_CARD_DATA[s]) { SET_CARD_DATA[s] = []; setsOrder.push(s); }
    SET_CARD_DATA[s].push({
      num: r['Card Number'] || '', name: r['Card Name'] || '',
      variants: r['Variant'] ? r['Variant'].split(',').map(v=>v.trim()).filter(Boolean) : [],
      serials: r['EX Serial Numbers'] ? r['EX Serial Numbers'].split(',').map(s=>s.trim()).filter(Boolean) : [],
      primary: r['Primary Pokemon'] || '', cameo: r['Cameo Pokemon'] || ''
    });
  });
  KNOWN_SETS = setsOrder;
  POKEMON_LIST = pokemonRows.sort((a,b) => parseInt(a['Dex Number']||0) - parseInt(b['Dex Number']||0)).map(r => r['Name']).filter(Boolean);
  BASE_SET_CARDS = SET_CARD_DATA['Base Set'] || [];
}

function hideLoadingScreen() { document.getElementById('loading-screen').style.display = 'none'; document.querySelector('.app').style.display = ''; }

async function loadData() {
  try {
    var [cR, sR, pR] = await Promise.all([fetch(CONFIG.CARDS_SHEET_URL), fetch(CONFIG.SETS_SHEET_URL), fetch(CONFIG.POKEMON_SHEET_URL)]);
    buildDataFromSheets(parseCSV(await cR.text()), parseCSV(await sR.text()), parseCSV(await pR.text()));
    var saved = localStorage.getItem('gotMiltank_backup');
    if (saved) {
      var p = JSON.parse(saved);
      cards = p.cards || []; cardIdCtr = p.cardIdCtr || 0; pokemonFilter = p.pokemonFilter || '';
      includeCameo = !!p.includeCameo; includeSerials = !!p.includeSerials;
    }
    setPaper('Letter-L'); renderForms(); renderPreview(); hideLoadingScreen();
  } catch (e) { console.error(e); hideLoadingScreen(); }
}

loadData();
